name: Bug report
description: Report a defect in the reference implementation
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "⚠️ For **security** issues, do not file here — use private reporting (see SECURITY.md)."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations: { required: true }
  - type: input
    id: provider
    attributes:
      label: Agent runtime(s) and version
      description: Claude Code / Codex / OpenCode
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, browser
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (redact secrets)
      render: shell
